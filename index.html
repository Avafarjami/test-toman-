<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-marker type="pattern" url="pattern-banknote.patt">
            <a-entity 
                id="rate-display" 
                position="0 0.5 0" 
                rotation="-90 0 0"
                scale="2 2 2"
                text="value: Loading...; color: #228B22; align: center; width: 5;">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // تابعی که دقیقاً مثل نسخه اول قیمت دلار را می‌گیرد
        async function updatePrice() {
            try {
                const response = await fetch("https://open.er-api.com/v6/latest/USD");
                const data = await response.json();
                const rate = data.rates.IRR;
                
                // محاسبه قیمت بر اساس ۱۰,۰۰۰ ریال (مطابق کد قبلی شما)
                const price = (10000 / rate).toFixed(4);
                
                // نمایش در دنیای واقعیت افزوده
                const display = document.querySelector('#rate-display');
                display.setAttribute('text', 'value', `10,000 Rial = $${price} USD`);
                
            } catch (e) { 
                console.error("خطا در ارتباط با API:", e);
                document.querySelector('#rate-display').setAttribute('text', 'value', "API Error!");
            }
        }

        // اجرای تابع به محض لود شدن صفحه
        window.onload = updatePrice;
    </script>
</body>
</html>
