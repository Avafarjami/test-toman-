<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-marker preset="hiro">
            <a-entity 
                id="rate-display" 
                position="0 1 0" 
                rotation="-90 0 0"
                scale="2 2 2"
                text="value: Loading Price...; color: yellow; align: center; width: 6;">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        async function updatePrice() {
            try {
                const response = await fetch("https://open.er-api.com/v6/latest/USD");
                const data = await response.json();
                const rate = data.rates.IRR;
                const price = (10000 / rate).toFixed(4);
                
                const display = document.querySelector('#rate-display');
                display.setAttribute('text', 'value', `10,000 Rial = $${price} USD`);
            } catch (e) { 
                document.querySelector('#rate-display').setAttribute('text', 'value', "Error");
            }
        }
        window.addEventListener('load', updatePrice);
    </script>
</body>
</html>
